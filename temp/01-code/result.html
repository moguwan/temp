<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="side-nav show-nav">
      <div class="nav-item"><a href="#section0" class="nav-link">线路与元件文档</a></div>
      <div class="nav-item"><a href="#section1" class="nav-link">质粒设计</a></div>
      <div class="nav-item"><a href="#section2" class="nav-link">线路设计</a></div>
      <div class="nav-item"><a href="#section3" class="nav-link">产品设计</a></div>
    </nav>

    <div class="back-to-top-wrapper" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
      <img src="back-to-top.svg" alt="回到顶部" class="back-to-top" />
      <div class="tooltip">回到顶部</div>
    </div>

    <div class="menu-area">
      <a href="index.html" class="logo-link"><img src="logo.png" alt="Web Logo" class="logo-img" /></a>
      <div class="btn-container">
        <button class="btn home-btn" onclick="window.location.href='index.html'">首页 <i class="fas fa-home"></i></button>
        <button class="btn home-btn" onclick="window.location.href='description.html'">项目介绍 <i class="fas fa-book"></i></button>
        <button class="btn home-btn" onclick="window.location.href='engineering.html'">项目设计 <i class="fas fa-cog"></i></button>
        <button class="btn home-btn nav-active" onclick="window.location.href='result.html'">线路与元件 <i class="fas fa-project-diagram"></i></button>
        <button class="btn home-btn" onclick="window.location.href='experiment.html'">实验设计 <i class="fas fa-flask"></i></button>
        <button class="btn home-btn" onclick="window.location.href='hp.html'">人类实践 <i class="fas fa-earth-asia"></i></button>
        <button class="btn home-btn" onclick="window.location.href='personal.html'">成员介绍 <i class="fas fa-user"></i></button>
        <button class="btn home-btn" onclick="window.location.href='model.html'">建模 <i class="fas fa-chart-line"></i></button>
        <button class="btn home-btn" onclick="window.location.href='contact.html'">联系我们 <i class="fas fa-envelope"></i></button>
      </div>
    </div>

    <div class="page-background"></div>
    <div class="hero-section">
      <div class="main-title">线路与元件</div>
      <div class="scroll-hint">向下滚动 <i class="fas fa-chevron-down"></i></div>
    </div>

    <div class="content-area">
      <div class="main-content">
        <div id="section0" class="text-content-section" style="margin-top: 5rem;">
          <div class="text-box-container docx-accordion">
            <div class="docx-accordion-title" onclick="this.parentElement.classList.toggle('active')">
              <span>线路与元件文档</span>
              <i class="fas fa-chevron-down"></i>
            </div>
            <div class="docx-accordion-content">
              <div class="docx-viewer-wrapper">
                <iframe id="docx-iframe" class="docx-iframe" src="" title="线路与元件文档"></iframe>
              </div>
            </div>
          </div>
        </div>

        <div id="section1" class="text-content-section">
          <div class="text-box-container">
            <div class="section-title">质粒设计</div>
            <div style="display: flex; justify-content: center; margin: 2rem 0;">
              <img src="线路与元件_a.png" alt="图 A" class="content-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
              <div class="img-slot" style="width: 80%; display: none;" data-fallback>A</div>
            </div>
            <div class="image-caption">图 A</div>
          </div>
        </div>

        <div id="section2" class="text-content-section">
          <div class="text-box-container">
            <div class="section-title">线路设计</div>
            <div style="display: flex; justify-content: center; margin: 2rem 0;">
              <img src="线路与元件_b.png" alt="图 B" class="content-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
              <div class="img-slot" style="width: 80%; display: none;" data-fallback>B</div>
            </div>
            <div class="image-caption">图 B</div>
          </div>
        </div>

        <div id="section3" class="text-content-section">
          <div class="text-box-container">
            <div class="section-title">产品设计</div>
            <div style="display: flex; justify-content: center; margin: 2rem 0;">
              <img src="线路与元件_产品设计.png" alt="产品设计" class="content-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
              <div class="img-slot" style="width: 80%; display: none;" data-fallback>C</div>
            </div>
          </div>
        </div>

        <div class="footer-wrapper">
          <div class="footer-content">
            <div class="footer-nav">
              <div class="footer-nav-row">
                <button class="footer-btn" onclick="window.location.href='index.html'">首页</button>
                <button class="footer-btn" onclick="window.location.href='description.html'">项目介绍</button>
                <button class="footer-btn" onclick="window.location.href='engineering.html'">项目设计</button>
                <button class="footer-btn" onclick="window.location.href='result.html'">线路与元件</button>
                <button class="footer-btn" onclick="window.location.href='experiment.html'">实验设计</button>
                <button class="footer-btn" onclick="window.location.href='hp.html'">人类实践</button>
                <button class="footer-btn" onclick="window.location.href='personal.html'">成员介绍</button>
                <button class="footer-btn" onclick="window.location.href='model.html'">建模</button>
                <button class="footer-btn" onclick="window.location.href='contact.html'">联系我们</button>
              </div>
            </div>
            <img src="logo.png" alt="Logo" class="seaguy-logo" />
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
    <script>
      (function() {
        var iframe = document.getElementById('docx-iframe');
        if (!iframe) return;
        iframe.src = '线路与元件_线路与元件.pdf';
      })();
    </script>
  </body>
</html>
